name: write-validate
description: 작성-검증 피드백 루프 워크플로우

# 작성 → 검증 → (개선 필요시) 개선 → 재검증
# 최대 3회 반복

max_iterations: 3

steps:
  - name: "draft"
    step: 1
    agent: writer
    action: draft
    description: "초안 작성"
    requirements: "${REQUIREMENTS}"
    target: "${TARGET_PATH}"
    output: "${CLAUDE_TMP_DIR}/draft.md"

  - name: "review"
    step: 2
    agent: reviewer
    mode: standard
    description: "초안 검증"
    input: "${CLAUDE_TMP_DIR}/draft.md"
    output: "${CLAUDE_TMP_DIR}/review_result.md"

  - name: "check-and-revise"
    step: 3
    description: "개선 필요성 확인 및 개선"
    loop:
      condition: "has_critical_or_warnings"
      max_iterations: 3
      steps:
        - agent: writer
          action: revise
          description: "피드백 기반 개선"
          draft: "${CLAUDE_TMP_DIR}/draft.md"
          feedback: "${CLAUDE_TMP_DIR}/review_result.md"
          output: "${CLAUDE_TMP_DIR}/draft.md"

        - agent: reviewer
          mode: standard
          description: "재검증"
          input: "${CLAUDE_TMP_DIR}/draft.md"
          output: "${CLAUDE_TMP_DIR}/review_result.md"

finalization:
  - name: "complete"
    description: "작업 완료"
    actions:
      - copy:
          from: "${CLAUDE_TMP_DIR}/draft.md"
          to: "${TARGET_PATH}"
      - notify: "작성-검증 피드백 루프 완료"

outputs:
  draft: "${CLAUDE_TMP_DIR}/draft.md"
  review: "${CLAUDE_TMP_DIR}/review_result.md"
  final: "${TARGET_PATH}"
