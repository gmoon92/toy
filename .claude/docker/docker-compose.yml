name: claude-code

services:
  # https://github.com/oraios/serena/blob/main/DOCKER.md
  # https://github.com/oraios/serena/pkgs/container/serena
  serena:
    image: ghcr.io/oraios/serena:latest
    container_name: mcp-serena
    stdin_open: true
    tty: true
    ports:
      # Web Dashboard 포트 (호스트:컨테이너)
      - "24282:24282"
    volumes:
      # 현재 프로젝트(toy)를 워크스페이스로 마운트
      - ../../:/workspace/toy
    environment:
      - SERENA_DOCKER=1
    command: >
      sleep infinity
    restart: "no"

  # https://github.com/modelcontextprotocol/servers/tree/main/src/sequentialthinking
  sequential-thinking:
    image: mcp/sequentialthinking:latest
    container_name: mcp-sequential-thinking
    stdin_open: true
    tty: true
    environment:
      # 생각 정보 로깅을 비활성화하려면 true로 설정
      - DISABLE_THOUGHT_LOGGING=false
    # MCP 서버는 stdio 기반으로 동작하므로 포트 매핑은 필요 없음
    # Claude Code settings.json의 mcpServers 설정 예시:
    # {
    #   "mcpServers": {
    #     "sequential-thinking": {
    #       "command": "docker",
    #       "args": ["compose", "-f", ".claude/docker/docker-compose.yml", "run", "--rm", "sequential-thinking"]
    #     }
    #   }
    # }
    restart: "no"
